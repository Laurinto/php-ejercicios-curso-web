<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con PHP</title>
</head>
<body>
    <form action="procesar.php" method="POST">

        <section>
            <article>
                <label for="valor-1">Valor 1</label>
                <input type="number" id="numero1" name="numero1" required>
            </article>
            <article>
                <label for="valor-2">Valor 2</label>
                <input type="number" id="numero2" name="numero2" required>
            </article>
    
            <article>
                <label for="operacion">Tipo de operación</label>
                <div>
                    <input type="radio" name="operacion" value="suma" checked>
                    <label for="suma">Suma</label>
                    <input type="radio" name="operacion" value="resta">
                    <label for="resta">Resta</label>
                    <input type="radio" name="operacion" value="multiplicacion">
                    <label for="multiplicacion">Multiplicación</label>
                    <input type="radio" name="operacion" value="division">
                    <label for="division">División</label>
                </div>
            </article>
            <button type="submit" name="haceroperacion">Hacer operación</button>
        </section>

        
    </form>
</body>
</html>
